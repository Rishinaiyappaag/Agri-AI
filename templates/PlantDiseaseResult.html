{% extends "layout.html" %}

{% block body %}
<br><br>

<h2 style="
    text-align:center;
    color:#1b5e20;
    font-size:34px;
    font-weight:700;
">
    🌿 Plant Disease Prediction Result
</h2>

<div style="
    width:440px;
    margin:30px auto;
    padding:28px;
    border-radius:20px;
    background:#ffffff;
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
    text-align:center;
">

    <!-- Uploaded Image -->
    <img src="{{ image_path }}"
         alt="Uploaded Leaf Image"
         style="
            width:100%;
            max-height:260px;
            object-fit:contain;
            border-radius:14px;
            margin-bottom:18px;
            border:2px solid #e0f2f1;
         ">

    <!-- Plant Name -->
    <h3 style="
        color:#1565c0;
        font-weight:600;
        margin-bottom:10px;
    ">
        🌱 Plant: <b>{{ plant }}</b>
    </h3>

    <!-- Disease / Healthy Badge -->
    {% if disease|lower == "healthy" %}
        <div style="
            display:inline-block;
            padding:10px 22px;
            background:#2e7d32;
            color:white;
            border-radius:25px;
            font-size:18px;
            font-weight:600;
            margin:12px 0;
        ">
            ✅ Healthy Leaf
        </div>
    {% else %}
        <div style="
            display:inline-block;
            padding:10px 22px;
            background:#c62828;
            color:white;
            border-radius:25px;
            font-size:18px;
            font-weight:600;
            margin:12px 0;
        ">
            ❌ Disease: {{ disease }}
        </div>
    {% endif %}

    <!-- Confidence -->
    <div style="margin-top:20px;">
        <h4 style="color:#37474f; margin-bottom:5px;">Prediction Confidence</h4>
        <h3 style="color:#1565c0; font-size:26px;">
            {{ confidence }}%
        </h3>
    </div>

    <!-- Retry Button -->
    <a href="/PlantDisease.html"
       style="
         display:inline-block;
         margin-top:25px;
         padding:10px 28px;
         background:#1b5e20;
         color:white;
         border-radius:30px;
         text-decoration:none;
         font-size:16px;
         font-weight:600;
         transition:0.3s;
       "
       onmouseover="this.style.background='#2e7d32'"
       onmouseout="this.style.background='#1b5e20'">
        🔁 Try Another Image
    </a>

</div>

{% endblock %}
